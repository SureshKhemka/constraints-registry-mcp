name: Publish to PyPI

# Publishes the package to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored as a secret.
#
# One-time PyPI setup (https://docs.pypi.org/trusted-publishers/):
#   Add a "pending publisher" for project `constraints-registry` with:
#     Owner:            SureshKhemka
#     Repository name:  constraints-registry
#     Workflow name:    publish.yml
#     Environment name: pypi
# Then create a GitHub Environment named `pypi` in repo Settings → Environments.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
